server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/library_management_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: ${DB_PASSWORD:root}  # Navicat/本机 MySQL 密码，可通过环境变量 DB_PASSWORD 覆盖
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.course.management.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.course.management: info